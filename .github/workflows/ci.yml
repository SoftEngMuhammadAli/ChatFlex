name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Lint dashboard
        run: npm --prefix client run lint

      - name: Build widget
        run: npm --prefix widget run build

      - name: Build dashboard
        run: npm --prefix client run build

