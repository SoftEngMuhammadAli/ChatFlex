<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatFlex Widget Test</title>
    <style>
      body {
        font-family:
          Segoe UI,
          Tahoma,
          sans-serif;
        margin: 0;
        padding: 32px;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      }
      .card {
        max-width: 780px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      input,
      button {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }
      button {
        cursor: pointer;
        background: #0f766e;
        color: #fff;
        border: none;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      code {
        display: block;
        padding: 10px;
        border-radius: 8px;
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ChatFlex Widget Test Page</h1>
      <p>
        Use this page to validate widget loading, message send/receive, and
        conversation persistence.
      </p>

      <div class="row">
        <input
          id="workspaceId"
          placeholder="Workspace ID (Mongo ObjectId)"
          style="min-width: 320px"
        />
        <button id="loadWidget">Load Widget</button>
        <button id="clearWidgetData">Clear Stored Conversation</button>
      </div>

      <p>Expected local server endpoint:</p>
      <code>http://localhost:3000/widget.js</code>
      <p>Before testing, run server and ensure the workspace ID exists.</p>
    </div>

    <script>
      const workspaceInput = document.getElementById("workspaceId");
      const loadBtn = document.getElementById("loadWidget");
      const clearBtn = document.getElementById("clearWidgetData");

      const WIDGET_KEY_STORAGE = "chatflex_widget_workspace_id";
      workspaceInput.value = localStorage.getItem(WIDGET_KEY_STORAGE) || "";

      loadBtn.addEventListener("click", () => {
        const workspaceId = workspaceInput.value.trim();
        if (!workspaceId) {
          alert("Enter workspace ID first.");
          return;
        }

        localStorage.setItem(WIDGET_KEY_STORAGE, workspaceId);

        const oldScript = document.getElementById("chatflexWidgetScript");
        if (oldScript) oldScript.remove();

        const script = document.createElement("script");
        script.id = "chatflexWidgetScript";
        script.src = "http://localhost:3000/widget.js";
        script.setAttribute("data-key", workspaceId);
        script.setAttribute("data-api", "http://localhost:3000/api");
        script.setAttribute("data-color", "#0f766e");
        script.setAttribute("data-position", "right");
        script.setAttribute("data-welcome", "Welcome to test support.");
        document.body.appendChild(script);
      });

      clearBtn.addEventListener("click", () => {
        const workspaceId = workspaceInput.value.trim();
        const key = "chatflex_conv_" + workspaceId + "_" + window.location.host;
        localStorage.removeItem(key);
        alert("Stored widget conversation removed.");
      });
    </script>
  </body>
</html>
